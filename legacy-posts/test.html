<p>这是一篇用于测试博客更新流程的文章。</p>
<h2 id="为什么写这篇"><a href="#为什么写这篇" class="headerlink" title="为什么写这篇"></a>为什么写这篇</h2><p>先用一篇很短的文章确认静态博客还能正常更新：页面可以打开，首页能看到入口，归档里能找到记录，搜索索引也能收录内容。</p>
<h2 id="接下来"><a href="#接下来" class="headerlink" title="接下来"></a>接下来</h2><p>如果这篇文章发布顺利，后面就可以把测试内容替换成真正的笔记、教程或者日常记录。最小可用的流程跑通以后，更新博客就会轻松很多。</p>
