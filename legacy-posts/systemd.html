<h3 id="基本命令"><a href="#基本命令" class="headerlink" title="基本命令"></a>基本命令</h3><figure class="highlight pgsql"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br></pre></td><td class="code"><pre><code class="hljs pgsql">systemctl daemon-reload #刷新systemd<br>systemctl status <span class="hljs-type">name</span> #查看<span class="hljs-type">name</span>服务状态<br>systemctl <span class="hljs-keyword">start</span> <span class="hljs-type">name</span> #启动<span class="hljs-type">name</span>服务<br>systemd <span class="hljs-keyword">restart</span> <span class="hljs-type">name</span> #重启<span class="hljs-type">name</span>服务<br>systemctl stop <span class="hljs-type">name</span> #停止<span class="hljs-type">name</span>服务<br>systemctl <span class="hljs-keyword">enable</span> <span class="hljs-type">name</span> #开机启动<span class="hljs-type">name</span>服务<br>systemctl <span class="hljs-keyword">disable</span> <span class="hljs-type">name</span> #取消开机启动<span class="hljs-type">name</span>服务<br></code></pre></td></tr></table></figure>
